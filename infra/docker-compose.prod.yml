services:
  # Nginx Frontend (port 8000)
  frontend:
    build:
      context: ..
      dockerfile: presentation/frontend/Dockerfile.prod
    container_name: gradelens-frontend
    ports:
      - "8000:80"
    depends_on:
      - api
      - cv-api
    networks:
      - gradelens-network

  # Local HTTPS Nginx Proxy for iPhone camera testing
  https-nginx:
    image: nginx:alpine
    container_name: gradelens-https-nginx
    ports:
      - "8443:8443"
    volumes:
      - ../nginx-local.conf:/etc/nginx/nginx.conf:ro
      - ../certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - api
      - cv-api
    networks:
      - gradelens-network

  # Node API
  api:
    build:
      context: ../application/api
    container_name: gradelens-api
    depends_on:
      mongo:
        condition: service_started
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      MONGO_URL: mongodb://mongo:27017/gradelens
      REDIS_URL: redis://redis:6379/0
      SCAN_STORAGE_DIR: /data/scans
      JWT_ACCESS_SECRET: dev-access-secret-key-change-in-production
      JWT_REFRESH_SECRET: dev-refresh-secret-key-change-in-production
      ALLOWED_ORIGINS: http://localhost:8000,http://localhost:3000,http://192.168.100.199:8000,http://192.168.100.199:3000,https://192.168.100.199:8443,https://localhost:8443
    command: npm run dev
    volumes:
      - ../application/api/src:/app/src
      - ../storage/scans:/data/scans
    networks:
      - gradelens-network

  # Redis
  redis:
    image: redis:7
    container_name: gradelens-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - gradelens-network

  # Python CV Worker
  cv-worker:
    build:
      context: ../compute/cv
    container_name: gradelens-cv-worker
    depends_on:
      redis:
        condition: service_healthy
    command: python -m app.workers.scan_worker
    volumes:
      - ../storage/scans:/data/scans
      - ../storage:/app/storage
    environment:
      REDIS_URL: redis://redis:6379/0
      IMAGE_ROOT: /data/scans
      DEBUG: "false"
    networks:
      - gradelens-network

  # Python CV API
  cv-api:
    build:
      context: ../compute/cv
    container_name: gradelens-cv-api
    depends_on:
      - redis
    ports:
      - "8001:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    volumes:
      - ../storage:/app/storage
    environment:
      REDIS_URL: redis://redis:6379/0
      DEBUG: "false"
    networks:
      - gradelens-network

  # MongoDB
  mongo:
    image: mongo:4.4.18
    container_name: gradelens-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    networks:
      - gradelens-network

networks:
  gradelens-network:
    driver: bridge

volumes:
  mongo_data: